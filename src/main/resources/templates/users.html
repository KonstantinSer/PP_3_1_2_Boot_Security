<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список пользователей</title>
    <style>
        table { border-collapse: collapse; width: 100%; margin: 20px 0; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<h2>Пользователи</h2>

<table>
    <thead>
    <tr>
        <th>Имя (name)</th>
        <th>Email</th>
        <th>Возраст (age)</th>
        <th>Операции</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.name}">Имя</td>
        <td th:text="${user.email}">Email</td>
        <td th:text="${user.age}">Возраст</td>
        <td>
            <!-- Редактирование: GET /updateInfo?id=123 -->
            <a th:href="@{/updateInfo(id=${user.id})}" style="text-decoration: none;">
                <button type="button">✏️ Обновить</button>
            </a>

            <!-- Удаление: POST через форму -->
            <form th:action="@{/delete}" method="post" style="display: inline;">
                <input type="hidden" name="id" th:value="${user.id}" />
                <button type="submit" onclick="return confirm('Удалить?')">🗑️ Удалить</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<br/>

<input type="button" value="Add" onclick="window.location.href='/addNewUser'"/>

</body>
</html>
