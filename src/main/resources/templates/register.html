<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-register:hover {
            background: #764ba2;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
        }

        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="register-container">
    <h2>Регистрация нового пользователя</h2>

    <!-- Сообщения об ошибках -->
    <div th:if="${param.error}" class="error-message">
        Ошибка при регистрации. Пожалуйста, попробуйте снова.
    </div>

    <!-- Сообщение об успешной регистрации -->
    <div th:if="${param.registered}" class="success-message">
        Регистрация успешна! Теперь вы можете войти.
    </div>

    <!-- Форма регистрации -->
    <form th:action="@{/register}" method="post">
        <!-- CSRF токен (Thymeleaf добавит автоматически) -->

        <div class="form-group">
            <label for="username">Имя пользователя:</label>
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Введите имя пользователя"
                   required
                   minlength="3"
                   maxlength="50"
                   pattern="[a-zA-Z0-9_]+"
                   title="Только буквы, цифры и знак подчеркивания">
            <div class="password-requirements">Минимум 3 символа, только буквы, цифры и _</div>
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="Введите пароль"
                   required
                   minlength="6"
                   maxlength="100">
            <div class="password-requirements">Минимум 6 символов</div>
        </div>

        <div class="form-group">
            <label for="age">Возраст:</label>
            <input type="number"
                   id="age"
                   name="age"
                   placeholder="Введите возраст"
                   required
                   min="1"
                   max="120">
        </div>

        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Введите email"
                   required
                   maxlength="100">
        </div>

        <button type="submit" class="btn-register">Зарегистрироваться</button>
    </form>

    <div class="login-link">
        Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
    </div>
</div>
</body>
</html>
