<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Мой профиль</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="/user">Мой профиль</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <!-- Используем user из модели -->
          <span class="nav-link text-white" th:text="'Привет, ' + ${user.username}">
                            Привет, пользователь
                        </span>
        </li>
        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="card">
    <div class="card-header">
      <h3>Мой профиль</h3>
    </div>
    <div class="card-body">
      <p><strong>ID:</strong> <span th:text="${user.id}">1</span></p>
      <p><strong>Имя пользователя:</strong> <span th:text="${user.username}">username</span></p>
      <p><strong>Возраст:</strong> <span th:text="${user.age}">25</span></p>
      <p><strong>Email:</strong> <span th:text="${user.email}">email@example.com</span></p>
      <p><strong>Роли:</strong>
        <span th:each="role : ${user.roles}"
              class="badge bg-primary me-1"
              th:text="${role.name.replace('ROLE_', '')}">
                    </span>
      </p>
    </div>
  </div>
</div>
</body>
</html>
