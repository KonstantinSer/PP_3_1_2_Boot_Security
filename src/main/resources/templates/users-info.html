<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Информация о пользователе</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="number"], input[type="password"] {
            width: 250px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover { background-color: #45a049; }
        .cancel-btn {
            background-color: #f44336;
        }
        .cancel-btn:hover { background-color: #da190b; }
        .error {
            color: red;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid red;
            background-color: #ffeeee;
            border-radius: 4px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 th:text="${user.id == null} ? 'Добавление нового пользователя' : 'Редактирование пользователя'">
        Заголовок формы
    </h1>
    <form th:action="@{/logout}" method="post">
        <button type="submit" style="background-color: #008CBA;">Выйти</button>
    </form>
</div>

<!-- Блок отображения ошибок -->
<div class="error" th:if="${error != null}" th:text="${error}">
    Сообщение об ошибке
</div>

<!-- Форма для добавления/редактирования -->
<form th:action="@{${user.id == null} ? '/admin/addNewUser' : '/admin/updateInfo'}"
      th:object="${user}" method="post">

    <!-- ID пользователя (только при редактировании) -->
    <input type="hidden" th:field="*{id}" th:if="${user.id != null}"/>

    <div class="form-group">
        <label>Имя пользователя:</label>
        <input type="text" th:field="*{username}" required
               placeholder="Введите имя пользователя"/>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="*{email}" required
               placeholder="Введите email"/>
    </div>

    <div class="form-group">
        <label>Возраст:</label>
        <input type="number" th:field="*{age}" required
               placeholder="Введите возраст" min="1" max="150"/>
    </div>

    <!-- Поле для пароля - обязательно только при создании -->
    <div class="form-group" th:if="${user.id == null}">
        <label>Пароль:</label>
        <input type="password" th:field="*{password}" required
               placeholder="Введите пароль"/>
    </div>

    <!-- Для редактирования - необязательное поле пароля -->
    <div class="form-group" th:if="${user.id != null}">
        <label>Новый пароль:</label>
        <input type="password" name="newPassword"
               placeholder="Оставьте пустым, если не хотите менять"/>
        <small style="color: #666; display: block; margin-left: 125px;">
            Заполните только если хотите изменить пароль
        </small>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <button type="submit" th:text="${user.id == null} ? 'Создать' : 'Сохранить изменения'">
            Сохранить
        </button>
        <a href="/admin">
            <button type="button" class="cancel-btn">Отмена</button>
        </a>
    </div>
</form>
</body>
</html>
