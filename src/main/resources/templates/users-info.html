<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Info</title>
</head>
<body>
<h2 th:text="${user.id == null} ? '➕ Добавить пользователя' : '✏️ Добавить пользователя'">User info</h2>

<form method="post" th:action="@{/saveUser}" th:object="${user}">
    <input type="hidden" th:field="*{id}"/>

    <div class="form-group">
        <label>Имя:</label>
        <input type="text" th:field="*{name}" placeholder="Введите имя" required/>
        <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</span>
    </div>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Введите email" required/>
        <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Ошибка</span>
    </div>

    <div class="form-group">
        <label>Возраст:</label>
        <input type="number" th:field="*{age}" placeholder="Введите возраст"/>
        <span class="error" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Ошибка</span>
    </div>

    <div>
        <button type="submit">
            <span th:text="${user.id == null} ? '➕ Добавить' : '✅ Сохранить изменения'">Добавить</span>
        </button>
        <a href="/users" style="margin-left: 10px;">← Отмена</a>
    </div>
</form>

<br>
<a href="/users">← Назад к списку пользователей</a>
</body>
</html>
